    <meta charset="UTF-8">
    <title>Kontak Kami</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8c8d8;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #ff4f87;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ff7aa2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #ff4f87;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            text-decoration: none;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hubungi Kami</h1>

        <form>
            <label>Nama</label>
            <input type="text" placeholder="Masukkan nama kamu">

            <label>Email</label>
            <input type="email" placeholder="Masukkan email kamu">

            <label>Pesan</label>
            <textarea rows="4" placeholder="Tulis pesan kamu..."></textarea>

            <button type="submit">Kirim Pesan</button>
        </form>

        <div class="back">
            <a href="index.html">← Kembali ke Beranda</a>
        </div>
    </div>

</body>
